<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
        background-size: 400% 400%;
        animation: bg 10s ease infinite;
    }

    @keyframes bg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .box {
        text-align: center;
        padding: 40px;
        border-radius: 20px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        color: white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 320px;
        position: relative;
    }

    h1 {
        font-size: 1.8rem;
    }

    #msg {
        margin-top: 15px;
        min-height: 60px;
        font-size: 1.1rem;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    }

    #yes {
        background: white;
        color: #ff4d88;
        margin-right: 10px;
    }

    #no {
        background: #ff4d88;
        color: white;
        position: absolute;
    }

    #final {
        margin-top: 20px;
        font-size: 1.2rem;
        display: none;
    }

</style>

<script>
    let text = "I wanted to ask you something... 💭";
    let i = 0;

    function typing() {
        if (i < text.length) {
            document.getElementById("msg").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }

    function moveNo() {
        let btn = document.getElementById("no");
        let x = Math.random() * 250;
        let y = Math.random() * 200;
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    function sayYes() {
        document.getElementById("msg").innerHTML = "";
        document.getElementById("question").style.display = "none";
        document.getElementById("final").style.display = "block";
    }

    window.onload = typing;
</script>

</head>

<body>

<div class="box">

    <h1>Hey You 😊</h1>

    <div id="msg"></div>

    <div id="question" style="margin-top:20px;">
        <p>Do you like me? 😏</p>

        <button id="yes" onclick="sayYes()">Yes 💖</button>
        <button id="no" onmouseover="moveNo()">No 🙈</button>
    </div>

    <div id="final">
        <b>Hehe I knew it 😌❤️</b><br><br>
        Not gonna lie…<br>
        I made this just for you 💕<br><br>
        <b>I really really like you ❤️</b><br><br>
        Now don’t stop smiling 😊
    </div>

</div>

</body>
</html>
