<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My HTML Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 25px;
        }

        .links a {
            display: block;
            text-decoration: none;
            color: white;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .links a:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌐 My HTML Library (Specially for you)</h1>
        <p>Specially for You</p>

        <div class="links">
            <a href="traveller.html" target="_blank">🌍 Travel Explorer</a>
            <a href="movie.html" target="_blank">🎬 Movie Hub</a>
            <a href="course.html" target="_blank">📚 LearnHub</a>
            <a href="restaurant.html" target="_blank">🍽️ Food Delight</a>
            <a href="cafe.html" target="_blank">🍽️ Cafe</a>
            <a href="special.html" target="_blank">Something Special</a>
        </div>

        <p>Do you want more or anything else babyyyyyy...</p>
    </div>

</body>
</html>
